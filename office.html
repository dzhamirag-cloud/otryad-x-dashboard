<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отряд X — Офис</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #office-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #stats-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff88;
            font-size: 12px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .view-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
        .view-toggle a {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
            text-decoration: none;
            font-size: 10px;
            transition: all 0.3s;
        }
        .view-toggle a:hover {
            background: rgba(0, 255, 136, 0.4);
            transform: scale(1.05);
        }
        #agent-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            padding: 20px;
            border: 2px solid #00ff88;
            border-radius: 8px;
            color: #00ff88;
            font-size: 10px;
            max-width: 300px;
            display: none;
            z-index: 10;
        }
        .agent-name {
            font-size: 14px;
            margin-bottom: 10px;
            color: #fff;
        }
        .agent-stat {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div id="office-container">
        <div class="view-toggle">
            <a href="index.html">📊 GRID</a>
        </div>
        <canvas id="office-canvas"></canvas>
        <div id="stats-overlay">
            <div>ОТРЯД X — ОФИС</div>
            <div id="time"></div>
        </div>
        <div id="agent-info"></div>
    </div>

    <script>
        const canvas = document.getElementById('office-canvas');
        const ctx = canvas.getContext('2d');
        
        // Resize canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Isometric projection helpers
        const ISO = {
            tileWidth: 64,
            tileHeight: 32,
            
            toScreen(x, y, z = 0) {
                return {
                    x: (x - y) * (this.tileWidth / 2),
                    y: (x + y) * (this.tileHeight / 2) - z * this.tileHeight
                };
            }
        };

        // Agent data
        let agents = [];
        
        // Agent positions in office (isometric grid)
        const agentPositions = [
            { x: 2, y: 1, name: 'Кайро', emoji: '🤖', color: '#00d4ff' },
            { x: 5, y: 1, name: 'Марк', emoji: '📊', color: '#ff6b6b' },
            { x: 8, y: 1, name: 'Бренд', emoji: '🎨', color: '#ff00ff' },
            { x: 2, y: 4, name: 'Фин', emoji: '💰', color: '#ffd700' },
            { x: 5, y: 4, name: 'Текна', emoji: '⚙️', color: '#00ff88' },
            { x: 8, y: 4, name: 'Прайм', emoji: '👑', color: '#fff' }
        ];

        // Load agent data
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                agents = data.agents.map((agent, i) => ({
                    ...agent,
                    ...agentPositions[i],
                    animation: 'idle',
                    animFrame: 0
                }));
            } catch (e) {
                console.error('Failed to load data:', e);
            }
        }

        // Draw isometric cube
        function drawIsoCube(x, y, z, w, h, d, color) {
            const pos = ISO.toScreen(x, y, z);
            const cx = canvas.width / 2 + pos.x;
            const cy = canvas.height / 2 + pos.y;

            // Top face
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + w * ISO.tileWidth / 2, cy + w * ISO.tileHeight / 2);
            ctx.lineTo(cx, cy + (w + h) * ISO.tileHeight / 2);
            ctx.lineTo(cx - h * ISO.tileWidth / 2, cy + h * ISO.tileHeight / 2);
            ctx.closePath();
            ctx.fill();

            // Right face (darker)
            ctx.fillStyle = adjustBrightness(color, -30);
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + w * ISO.tileWidth / 2, cy + w * ISO.tileHeight / 2);
            ctx.lineTo(cx + w * ISO.tileWidth / 2, cy + w * ISO.tileHeight / 2 + d * ISO.tileHeight);
            ctx.lineTo(cx, cy + d * ISO.tileHeight);
            ctx.closePath();
            ctx.fill();

            // Left face (darkest)
            ctx.fillStyle = adjustBrightness(color, -50);
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx - h * ISO.tileWidth / 2, cy + h * ISO.tileHeight / 2);
            ctx.lineTo(cx - h * ISO.tileWidth / 2, cy + h * ISO.tileHeight / 2 + d * ISO.tileHeight);
            ctx.lineTo(cx, cy + d * ISO.tileHeight);
            ctx.closePath();
            ctx.fill();
        }

        // Adjust color brightness
        function adjustBrightness(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const r = Math.max(0, Math.min(255, (num >> 16) + percent));
            const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + percent));
            const b = Math.max(0, Math.min(255, (num & 0x0000FF) + percent));
            return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, '0')}`;
        }

        // Draw desk
        function drawDesk(x, y) {
            // Desk base
            drawIsoCube(x, y, 0, 1.5, 0.8, 0.8, '#8B4513');
            // Monitor
            drawIsoCube(x + 0.3, y + 0.2, 0.8, 0.6, 0.1, 0.5, '#333');
            drawIsoCube(x + 0.35, y + 0.25, 1.3, 0.5, 0.05, 0.4, '#1a1a2e');
            // Chair
            drawIsoCube(x - 0.5, y - 0.5, 0, 0.5, 0.5, 0.5, '#555');
            drawIsoCube(x - 0.5, y - 0.5, 0.5, 0.5, 0.5, 0.8, '#666');
        }

        // Draw agent character
        function drawAgent(agent) {
            const pos = ISO.toScreen(agent.x - 0.3, agent.y - 0.3, 0);
            const cx = canvas.width / 2 + pos.x;
            const cy = canvas.height / 2 + pos.y;

            // Character body (simple isometric person)
            const bodyColor = agent.color || '#00d4ff';
            
            // Body
            drawIsoCube(agent.x - 0.3, agent.y - 0.3, 0.5, 0.3, 0.3, 0.5, bodyColor);
            // Head
            drawIsoCube(agent.x - 0.25, agent.y - 0.25, 1.0, 0.2, 0.2, 0.25, adjustBrightness(bodyColor, 30));

            // Status indicator (working/idle)
            const indicator = agent.status === 'working' ? '💻' : '😴';
            ctx.font = '16px Arial';
            ctx.fillText(indicator, cx + 10, cy - 50);

            // Name tag
            ctx.fillStyle = '#fff';
            ctx.font = '8px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText(agent.name, cx, cy - 70);

            // Stats bar
            const barWidth = 60;
            const barHeight = 4;
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(cx - barWidth/2, cy - 60, barWidth, barHeight);
            
            const healthPercent = Math.min(1, (agent.tokens || 0) / 1000000);
            ctx.fillStyle = agent.color;
            ctx.fillRect(cx - barWidth/2, cy - 60, barWidth * healthPercent, barHeight);
        }

        // Draw floor
        function drawFloor() {
            const tiles = 12;
            for (let x = 0; x < tiles; x++) {
                for (let y = 0; y < tiles; y++) {
                    const color = (x + y) % 2 === 0 ? '#2c3e50' : '#34495e';
                    drawIsoCube(x, y, 0, 1, 1, 0.1, color);
                }
            }
        }

        // Main render loop
        function render() {
            // Clear
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw floor
            drawFloor();

            // Draw desks and agents
            agents.forEach(agent => {
                drawDesk(agent.x, agent.y);
                drawAgent(agent);
            });

            // Update time
            document.getElementById('time').textContent = new Date().toLocaleTimeString('ru-RU');

            requestAnimationFrame(render);
        }

        // Click handler
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            agents.forEach(agent => {
                const pos = ISO.toScreen(agent.x, agent.y, 1);
                const cx = canvas.width / 2 + pos.x;
                const cy = canvas.height / 2 + pos.y;

                const dist = Math.sqrt((mx - cx) ** 2 + (my - cy) ** 2);
                if (dist < 40) {
                    showAgentInfo(agent);
                }
            });
        });

        function showAgentInfo(agent) {
            const info = document.getElementById('agent-info');
            info.style.display = 'block';
            info.innerHTML = `
                <div class="agent-name">${agent.emoji} ${agent.name}</div>
                <div class="agent-stat">Токены: ${(agent.tokens || 0).toLocaleString()}</div>
                <div class="agent-stat">Задачи: ${agent.tasks || 0}</div>
                <div class="agent-stat">Стоимость: $${(agent.cost || 0).toFixed(2)}</div>
                <div class="agent-stat">Активность: ${agent.uptime || '0m'}</div>
            `;

            setTimeout(() => {
                info.style.display = 'none';
            }, 5000);
        }

        // Initialize
        loadData().then(() => {
            render();
        });
    </script>
</body>
</html>
