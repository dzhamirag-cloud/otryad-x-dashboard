<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отряд X — Офис</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #office-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #stats-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff88;
            font-size: 12px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .view-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
        .view-toggle a {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
            text-decoration: none;
            font-size: 10px;
            transition: all 0.3s;
        }
        .view-toggle a:hover {
            background: rgba(0, 255, 136, 0.4);
            transform: scale(1.05);
        }
        #agent-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            padding: 20px;
            border: 2px solid #00ff88;
            border-radius: 8px;
            color: #00ff88;
            font-size: 10px;
            max-width: 300px;
            display: none;
            z-index: 10;
        }
        .agent-name {
            font-size: 14px;
            margin-bottom: 10px;
            color: #fff;
        }
        .agent-stat {
            margin: 5px 0;
        }
        #agents-panel {
            position: absolute;
            left: 20px;
            top: 80px;
            width: 280px;
            background: rgba(0,0,0,0.9);
            border: 2px solid #00ff88;
            border-radius: 8px;
            padding: 15px;
            z-index: 10;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }
        .agent-card {
            background: rgba(20,20,40,0.8);
            border: 1px solid #444;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .agent-card:hover {
            border-color: #00ff88;
            transform: translateX(5px);
        }
        .agent-card-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .agent-emoji {
            font-size: 24px;
            margin-right: 10px;
        }
        .agent-card-name {
            font-size: 12px;
            color: #fff;
            flex: 1;
        }
        .agent-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .agent-card-stat {
            font-size: 8px;
            color: #aaa;
            margin: 3px 0;
        }
        .stat-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin: 4px 0;
            overflow: hidden;
        }
        .stat-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            transition: width 0.5s;
        }
    </style>
</head>
<body>
    <div id="office-container">
        <div class="view-toggle">
            <a href="index.html">📊 GRID</a>
        </div>
        <canvas id="office-canvas"></canvas>
        <div id="stats-overlay">
            <div>ОТРЯД X — ОФИС</div>
            <div id="time"></div>
        </div>
        <div id="agents-panel"></div>
        <div id="agent-info"></div>
    </div>

    <script>
        const canvas = document.getElementById('office-canvas');
        const ctx = canvas.getContext('2d');
        
        // Resize canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Isometric projection helpers
        const ISO = {
            tileWidth: 64,
            tileHeight: 32,
            
            toScreen(x, y, z = 0) {
                return {
                    x: (x - y) * (this.tileWidth / 2),
                    y: (x + y) * (this.tileHeight / 2) - z * this.tileHeight
                };
            }
        };

        // Agent data
        let agents = [];
        
        // Agent positions in office (isometric grid)
        const agentPositions = [
            { x: 2, y: 1, name: 'Кайро', emoji: '🤖', color: '#00d4ff' },
            { x: 5, y: 1, name: 'Марк', emoji: '📊', color: '#ff6b6b' },
            { x: 8, y: 1, name: 'Бренд', emoji: '🎨', color: '#ff00ff' },
            { x: 2, y: 4, name: 'Фин', emoji: '💰', color: '#ffd700' },
            { x: 5, y: 4, name: 'Текна', emoji: '⚙️', color: '#00ff88' },
            { x: 8, y: 4, name: 'Прайм', emoji: '👑', color: '#fff' }
        ];

        // Load agent data
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                agents = data.agents.map((agent, i) => ({
                    ...agent,
                    ...agentPositions[i],
                    animation: 'idle',
                    animFrame: 0,
                    status: agent.tokens > 0 ? 'working' : 'idle'
                }));
                
                updateAgentsPanel();
            } catch (e) {
                console.error('Failed to load data:', e);
            }
        }

        // Update agents panel
        function updateAgentsPanel() {
            const panel = document.getElementById('agents-panel');
            panel.innerHTML = agents.map(agent => `
                <div class="agent-card" onclick="focusAgent('${agent.name}')">
                    <div class="agent-card-header">
                        <span class="agent-emoji">${agent.emoji}</span>
                        <span class="agent-card-name">${agent.name}</span>
                        <span class="agent-status-dot"></span>
                    </div>
                    <div class="agent-card-stat">💰 Tokens: ${(agent.tokens || 0).toLocaleString()}</div>
                    <div class="stat-bar">
                        <div class="stat-bar-fill" style="width: ${Math.min(100, (agent.tokens || 0) / 10000)}%"></div>
                    </div>
                    <div class="agent-card-stat">📋 Tasks: ${agent.tasks || 0}</div>
                    <div class="agent-card-stat">💵 Cost: $${(agent.cost || 0).toFixed(2)}</div>
                    <div class="agent-card-stat">⏱ Uptime: ${agent.uptime || '0m'}</div>
                </div>
            `).join('');
        }

        function focusAgent(name) {
            const agent = agents.find(a => a.name === name);
            if (agent) {
                // Visual highlight
                agent.highlight = true;
                setTimeout(() => agent.highlight = false, 2000);
            }
        }

        // Draw isometric cube
        function drawIsoCube(x, y, z, w, h, d, color) {
            const pos = ISO.toScreen(x, y, z);
            const cx = canvas.width / 2 + pos.x;
            const cy = canvas.height / 2 + pos.y;

            // Top face
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + w * ISO.tileWidth / 2, cy + w * ISO.tileHeight / 2);
            ctx.lineTo(cx, cy + (w + h) * ISO.tileHeight / 2);
            ctx.lineTo(cx - h * ISO.tileWidth / 2, cy + h * ISO.tileHeight / 2);
            ctx.closePath();
            ctx.fill();

            // Right face (darker)
            ctx.fillStyle = adjustBrightness(color, -30);
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + w * ISO.tileWidth / 2, cy + w * ISO.tileHeight / 2);
            ctx.lineTo(cx + w * ISO.tileWidth / 2, cy + w * ISO.tileHeight / 2 + d * ISO.tileHeight);
            ctx.lineTo(cx, cy + d * ISO.tileHeight);
            ctx.closePath();
            ctx.fill();

            // Left face (darkest)
            ctx.fillStyle = adjustBrightness(color, -50);
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx - h * ISO.tileWidth / 2, cy + h * ISO.tileHeight / 2);
            ctx.lineTo(cx - h * ISO.tileWidth / 2, cy + h * ISO.tileHeight / 2 + d * ISO.tileHeight);
            ctx.lineTo(cx, cy + d * ISO.tileHeight);
            ctx.closePath();
            ctx.fill();
        }

        // Adjust color brightness
        function adjustBrightness(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const r = Math.max(0, Math.min(255, (num >> 16) + percent));
            const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + percent));
            const b = Math.max(0, Math.min(255, (num & 0x0000FF) + percent));
            return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, '0')}`;
        }

        // Draw shadow
        function drawShadow(x, y, size = 1) {
            const pos = ISO.toScreen(x, y, 0);
            const cx = canvas.width / 2 + pos.x;
            const cy = canvas.height / 2 + pos.y;
            
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(cx, cy + 5, size * 30, size * 15, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // Draw desk
        function drawDesk(x, y, agent) {
            // Shadow
            drawShadow(x + 0.5, y + 0.5, 1.5);
            
            // Desk base (wood texture)
            const deskColor = '#8B4513';
            drawIsoCube(x, y, 0, 1.5, 0.8, 0.8, deskColor);
            
            // Desk details (drawers)
            drawIsoCube(x + 0.1, y + 0.1, 0.2, 0.4, 0.2, 0.3, adjustBrightness(deskColor, -20));
            drawIsoCube(x + 1.0, y + 0.1, 0.2, 0.4, 0.2, 0.3, adjustBrightness(deskColor, -20));
            
            // Monitor stand
            drawIsoCube(x + 0.4, y + 0.3, 0.8, 0.3, 0.3, 0.15, '#555');
            
            // Monitor base
            drawIsoCube(x + 0.35, y + 0.25, 0.95, 0.6, 0.1, 0.5, '#333');
            
            // Monitor screen (with glow if working)
            const screenColor = agent && agent.status === 'working' ? '#1a4d6e' : '#0a0a1a';
            drawIsoCube(x + 0.38, y + 0.28, 1.0, 0.54, 0.05, 0.44, screenColor);
            
            // Screen glow
            if (agent && agent.status === 'working') {
                const pos = ISO.toScreen(x + 0.65, y + 0.5, 1.2);
                const cx = canvas.width / 2 + pos.x;
                const cy = canvas.height / 2 + pos.y;
                
                const gradient = ctx.createRadialGradient(cx, cy, 5, cx, cy, 30);
                gradient.addColorStop(0, 'rgba(0, 212, 255, 0.3)');
                gradient.addColorStop(1, 'rgba(0, 212, 255, 0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(cx - 30, cy - 30, 60, 60);
            }
            
            // Keyboard
            drawIsoCube(x + 0.3, y + 0.6, 0.8, 0.5, 0.3, 0.05, '#444');
            
            // Chair shadow
            drawShadow(x - 0.3, y - 0.3, 0.8);
            
            // Chair seat
            drawIsoCube(x - 0.5, y - 0.5, 0.5, 0.6, 0.6, 0.1, '#555');
            
            // Chair back
            drawIsoCube(x - 0.5, y - 0.2, 0.6, 0.6, 0.1, 0.6, '#666');
            
            // Chair wheels
            const wheelColor = '#333';
            drawIsoCube(x - 0.7, y - 0.7, 0, 0.1, 0.1, 0.05, wheelColor);
            drawIsoCube(x - 0.3, y - 0.7, 0, 0.1, 0.1, 0.05, wheelColor);
            drawIsoCube(x - 0.7, y - 0.3, 0, 0.1, 0.1, 0.05, wheelColor);
            drawIsoCube(x - 0.3, y - 0.3, 0, 0.1, 0.1, 0.05, wheelColor);
        }

        // Draw agent character
        function drawAgent(agent) {
            const pos = ISO.toScreen(agent.x - 0.3, agent.y - 0.3, 0);
            const cx = canvas.width / 2 + pos.x;
            const cy = canvas.height / 2 + pos.y;

            // Shadow
            drawShadow(agent.x - 0.2, agent.y - 0.2, 0.5);

            // Character body (simple isometric person)
            const bodyColor = agent.color || '#00d4ff';
            
            // Highlight circle if focused
            if (agent.highlight) {
                ctx.strokeStyle = agent.color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(cx, cy - 20, 40, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // Legs (sitting)
            drawIsoCube(agent.x - 0.4, agent.y - 0.4, 0.3, 0.15, 0.15, 0.3, adjustBrightness(bodyColor, -40));
            drawIsoCube(agent.x - 0.2, agent.y - 0.4, 0.3, 0.15, 0.15, 0.3, adjustBrightness(bodyColor, -40));
            
            // Body (torso)
            drawIsoCube(agent.x - 0.35, agent.y - 0.35, 0.6, 0.3, 0.3, 0.4, bodyColor);
            
            // Arms (on keyboard)
            drawIsoCube(agent.x - 0.1, agent.y + 0.2, 0.7, 0.15, 0.3, 0.1, adjustBrightness(bodyColor, -20));
            drawIsoCube(agent.x - 0.5, agent.y + 0.2, 0.7, 0.15, 0.3, 0.1, adjustBrightness(bodyColor, -20));
            
            // Head
            const headColor = adjustBrightness(bodyColor, 30);
            drawIsoCube(agent.x - 0.3, agent.y - 0.3, 1.0, 0.25, 0.25, 0.3, headColor);
            
            // Face dot (eyes/simple face)
            const facePos = ISO.toScreen(agent.x - 0.2, agent.y - 0.2, 1.15);
            const faceCx = canvas.width / 2 + facePos.x;
            const faceCy = canvas.height / 2 + facePos.y;
            ctx.fillStyle = '#000';
            ctx.fillRect(faceCx - 2, faceCy, 2, 2); // left eye
            ctx.fillRect(faceCx + 4, faceCy, 2, 2); // right eye

            // Status particles (working)
            if (agent.status === 'working' && Math.random() > 0.7) {
                ctx.fillStyle = agent.color;
                ctx.font = '12px Arial';
                ctx.fillText('✨', cx + (Math.random() - 0.5) * 30, cy - 40 - Math.random() * 20);
            }

            // Name tag background
            const nameWidth = ctx.measureText(agent.name).width;
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(cx - nameWidth/2 - 4, cy - 80, nameWidth + 8, 12);
            
            // Name tag
            ctx.fillStyle = agent.color;
            ctx.font = '8px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText(agent.name, cx, cy - 70);

            // Stats bar
            const barWidth = 60;
            const barHeight = 4;
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(cx - barWidth/2, cy - 60, barWidth, barHeight);
            
            const healthPercent = Math.min(1, (agent.tokens || 0) / 1000000);
            const gradient = ctx.createLinearGradient(cx - barWidth/2, 0, cx + barWidth/2, 0);
            gradient.addColorStop(0, agent.color);
            gradient.addColorStop(1, adjustBrightness(agent.color, 50));
            ctx.fillStyle = gradient;
            ctx.fillRect(cx - barWidth/2, cy - 60, barWidth * healthPercent, barHeight);
        }

        // Draw floor
        function drawFloor() {
            const tiles = 12;
            for (let x = 0; x < tiles; x++) {
                for (let y = 0; y < tiles; y++) {
                    const color = (x + y) % 2 === 0 ? '#2c3e50' : '#34495e';
                    drawIsoCube(x, y, 0, 1, 1, 0.1, color);
                }
            }
        }

        // Main render loop
        function render() {
            // Clear
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw floor
            drawFloor();

            // Draw desks and agents
            agents.forEach(agent => {
                drawDesk(agent.x, agent.y, agent);
                drawAgent(agent);
            });
            
            // Update agents panel periodically
            if (Math.random() > 0.95) {
                updateAgentsPanel();
            }

            // Update time
            document.getElementById('time').textContent = new Date().toLocaleTimeString('ru-RU');

            requestAnimationFrame(render);
        }

        // Click handler
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            agents.forEach(agent => {
                const pos = ISO.toScreen(agent.x, agent.y, 1);
                const cx = canvas.width / 2 + pos.x;
                const cy = canvas.height / 2 + pos.y;

                const dist = Math.sqrt((mx - cx) ** 2 + (my - cy) ** 2);
                if (dist < 40) {
                    showAgentInfo(agent);
                }
            });
        });

        function showAgentInfo(agent) {
            const info = document.getElementById('agent-info');
            info.style.display = 'block';
            info.innerHTML = `
                <div class="agent-name">${agent.emoji} ${agent.name}</div>
                <div class="agent-stat">Токены: ${(agent.tokens || 0).toLocaleString()}</div>
                <div class="agent-stat">Задачи: ${agent.tasks || 0}</div>
                <div class="agent-stat">Стоимость: $${(agent.cost || 0).toFixed(2)}</div>
                <div class="agent-stat">Активность: ${agent.uptime || '0m'}</div>
            `;

            setTimeout(() => {
                info.style.display = 'none';
            }, 5000);
        }

        // Initialize
        loadData().then(() => {
            render();
        });
    </script>
</body>
</html>
