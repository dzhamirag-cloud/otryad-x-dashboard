<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Отряд X — Command Center</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    color: #e0e0e0;
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  .view-toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 100;
  }

  .view-toggle a {
    display: inline-block;
    padding: 10px 20px;
    background: rgba(0, 255, 136, 0.2);
    border: 2px solid #00ff88;
    color: #00ff88;
    text-decoration: none;
    font-size: 10px;
    transition: all 0.3s;
  }

  .view-toggle a:hover {
    background: rgba(0, 255, 136, 0.4);
    transform: scale(1.05);
  }

  .header {
    text-align: center;
    padding: 24px 16px 16px;
    border-bottom: 2px solid #1a1a3a;
  }

  .header h1 {
    font-size: 14px;
    color: #5ac8fa;
    text-shadow: 0 0 10px rgba(90,200,250,0.5);
    margin-bottom: 8px;
  }

  .header .subtitle { font-size: 8px; color: #666; }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 12px;
    background: #0d0d20;
    border-bottom: 1px solid #1a1a3a;
    font-size: 8px;
    flex-wrap: wrap;
  }

  .stat { display: flex; align-items: center; gap: 6px; }
  .stat-label { color: #666; }
  .stat-value { color: #5ac8fa; }
  .stat-value.active { color: #34c759; }
  .stat-value.cost { color: #ffd60a; }
  .stat-value.time { color: #888; font-size: 7px; }

  .main-container {
    display: flex;
    gap: 20px;
    padding: 20px;
    max-width: 1600px;
    margin: 0 auto;
  }

  .agents-section {
    flex: 1;
  }

  .world {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }
  
  .sidebar {
    width: 350px;
    flex-shrink: 0;
  }
  
  .activity-feed {
    background: linear-gradient(135deg, #1a1a3a 0%, #2a2a4a 100%);
    border: 2px solid #444;
    border-radius: 12px;
    padding: 15px;
    max-height: 600px;
    overflow-y: auto;
  }
  
  .activity-feed h3 {
    font-size: 12px;
    color: #00ff88;
    margin-bottom: 15px;
    text-transform: uppercase;
  }
  
  .activity-item {
    padding: 10px;
    background: rgba(0,0,0,0.3);
    border-radius: 6px;
    margin-bottom: 10px;
    font-size: 8px;
    color: #ccc;
    border-left: 3px solid #00ff88;
  }
  
  .activity-item .time {
    color: #666;
    display: block;
    margin-bottom: 5px;
  }
  
  .activity-item .agent-name {
    color: #00ff88;
    font-size: 9px;
  }
  
  .mini-chart {
    width: 100%;
    height: 40px;
    margin-top: 10px;
  }
  
  @media (max-width: 1024px) {
    .main-container {
      flex-direction: column;
    }
    .sidebar {
      width: 100%;
    }
  }

  .agent-card {
    background: #111128;
    border: 2px solid #1a1a3a;
    border-radius: 4px;
    padding: 16px;
    position: relative;
    cursor: pointer;
    transition: all 0.2s;
  }

  .agent-card:hover {
    border-color: #3377ff;
    box-shadow: 0 0 20px rgba(51,119,255,0.2);
    transform: translateY(-2px);
  }

  .agent-card.active { border-color: #34c759; box-shadow: 0 0 15px rgba(52,199,89,0.15); }
  .agent-card.idle { border-color: #2a2a4a; opacity: 0.7; }

  .status-dot {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 8px;
    height: 8px;
  }

  .status-dot.active { background: #34c759; box-shadow: 0 0 8px #34c759; animation: blink 2s infinite; }
  .status-dot.idle { background: #48484a; }
  .status-dot.working { background: #ffd60a; box-shadow: 0 0 8px #ffd60a; animation: blink 1s infinite; }

  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  .avatar-area { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }

  .avatar-container {
    width: 64px;
    height: 64px;
    flex-shrink: 0;
    position: relative;
    transition: transform 0.3s;
  }

  .avatar-container:hover {
    transform: scale(1.1);
  }

  .avatar-container svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 8px rgba(90, 200, 250, 0.3));
  }
  .agent-info h3 { font-size: 10px; margin-bottom: 4px; }
  .agent-role { font-size: 7px; color: #888; }

  .bars { margin: 10px 0; }

  .bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .bar-label { font-size: 6px; color: #888; width: 32px; text-align: right; }

  .bar-track {
    flex: 1;
    height: 8px;
    background: #1a1a2a;
    border: 1px solid #2a2a4a;
    position: relative;
    overflow: hidden;
  }

  .bar-fill { height: 100%; transition: width 0.5s; }
  .bar-fill.hp { background: #34c759; }
  .bar-fill.mp { background: #5ac8fa; }
  .bar-fill.xp { background: #ffd60a; }
  .bar-fill.hp.low { background: #ff3b30; }

  .bar-text { font-size: 6px; color: #aaa; width: 48px; }

  .task-bubble {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 2px;
    padding: 8px;
    font-size: 7px;
    color: #aaa;
    line-height: 1.6;
    position: relative;
    margin-top: 8px;
  }

  .task-bubble::before { content: '💬'; position: absolute; top: -10px; left: 8px; font-size: 10px; }
  .task-bubble .task-text { color: #ccc; }

  .task-status {
    display: inline-block;
    padding: 2px 6px;
    margin-top: 4px;
    font-size: 6px;
    border-radius: 2px;
  }

  .task-status.working { background: rgba(255,214,10,0.15); color: #ffd60a; border: 1px solid rgba(255,214,10,0.3); }
  .task-status.done { background: rgba(52,199,89,0.15); color: #34c759; border: 1px solid rgba(52,199,89,0.3); }
  .task-status.idle-status { background: rgba(72,72,74,0.15); color: #48484a; border: 1px solid rgba(72,72,74,0.3); }

  .task-history {
    max-width: 1600px;
    margin: 40px auto 20px;
    padding: 0 20px;
  }

  .task-history-panel {
    background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3a 100%);
    border: 2px solid #3377ff;
    border-radius: 12px;
    padding: 20px;
    max-height: 400px;
    overflow-y: auto;
  }

  .task-history-panel h3 {
    font-size: 14px;
    color: #5ac8fa;
    margin-bottom: 20px;
    text-transform: uppercase;
    text-align: center;
  }

  .task-item {
    background: rgba(0,0,0,0.3);
    border-left: 4px solid #00ff88;
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 12px;
    transition: all 0.3s;
  }

  .task-item:hover {
    background: rgba(0,0,0,0.5);
    transform: translateX(5px);
  }

  .task-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .task-agent {
    font-size: 10px;
    color: #00ff88;
    font-weight: bold;
  }

  .task-time {
    font-size: 8px;
    color: #666;
  }

  .task-text {
    font-size: 9px;
    color: #ccc;
    line-height: 1.4;
  }

  .footer {
    text-align: center;
    padding: 20px;
    font-size: 7px;
    color: #333;
    border-top: 1px solid #1a1a3a;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 500;
    justify-content: center;
    align-items: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: #111128;
    border: 2px solid #3377ff;
    border-radius: 4px;
    padding: 20px;
    max-width: 400px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal h2 { font-size: 11px; margin-bottom: 12px; color: #5ac8fa; }

  .modal .detail-row {
    display: flex;
    justify-content: space-between;
    font-size: 7px;
    padding: 6px 0;
    border-bottom: 1px solid #1a1a2a;
  }

  .modal .detail-label { color: #666; }
  .modal .detail-value { color: #ccc; }

  .modal .close-btn {
    margin-top: 12px;
    background: #1a1a3a;
    color: #5ac8fa;
    border: 1px solid #3377ff;
    padding: 8px 16px;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    cursor: pointer;
  }

  .modal .close-btn:hover { background: #2a2a5a; }
  
  @keyframes spin {
    from { transform: translateX(-50%) rotate(0deg); }
    to { transform: translateX(-50%) rotate(360deg); }
  }
</style>
</head>

};

function formatTokens(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'K';
  return n.toString();
}

function formatCost(n) {
  return '$' + n.toFixed(2);
}

function formatUptime(mins) {
  if (mins < 60) return mins + 'м';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h + 'ч ' + m + 'м';
}

const agentHistory = {};
let activities = [];

function trackActivity(agent) {
  const prev = agentHistory[agent.id];
  if (!prev) {
    agentHistory[agent.id] = agent;
    return;
  }
  
  if (agent.tokens > prev.tokens) {
    const delta = agent.tokens - prev.tokens;
    activities.unshift({
      time: new Date(),
      agent: agent.name,
      text: `использовал ${formatTokens(delta)} токенов`
    });
  }
  
  if (agent.costUsd > prev.costUsd) {
    const delta = agent.costUsd - prev.costUsd;
    activities.unshift({
      time: new Date(),
      agent: agent.name,
      text: `потратил ${formatCost(delta)}`
    });
  }
  
  activities = activities.slice(0, 20);
  agentHistory[agent.id] = agent;
}

function renderActivityFeed() {
  const list = document.getElementById('activity-list');
  if (activities.length === 0) {
    list.innerHTML = '<div style="color:#666;font-size:8px;text-align:center;padding:20px;">Пока нет активности</div>';
    return;
  }
  
  list.innerHTML = activities.map(a => `
    <div class="activity-item">
      <span class="time">${a.time.toLocaleTimeString('ru-RU')}</span>
      <span class="agent-name">${a.agent}</span> ${a.text}
    </div>
  `).join('');
}

let taskHistory = [];

function renderTaskHistory() {
  const list = document.getElementById('task-history-list');
  if (taskHistory.length === 0) {
    list.innerHTML = '<div style="color:#666;font-size:8px;text-align:center;padding:20px;">История задач загружается...</div>';
    return;
  }
  
  list.innerHTML = taskHistory.map(task => `
    <div class="task-item">
      <div class="task-header">
        <span class="task-agent">${task.emoji} ${task.agent}</span>
        <span class="task-time">${task.time}</span>
      </div>
      <div class="task-text">${task.text}</div>
    </div>
  `).join('');
}

async function loadTaskHistory() {
  try {
    const res = await fetch('tasks.json');
    const data = await res.json();
    taskHistory = data.tasks || [];
    renderTaskHistory();
  } catch (e) {
    console.log('Task history not available yet');
  }
}

function drawMiniChart(agentId, tokens) {
  const canvas = document.getElementById(`chart-${agentId}`);
  if (!canvas) return;
  
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  
  ctx.clearRect(0, 0, w, h);
  
  const points = 20;
  const values = Array(points).fill(0).map((_, i) => {
    return Math.sin(i * 0.3) * (tokens / 20000) + (tokens / 10000);
  });
  
  const maxVal = Math.max(...values, 1);
  
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth = 2;
  ctx.beginPath();
  
  values.forEach((val, i) => {
    const x = (i / (points - 1)) * w;
    const y = h - (val * h / maxVal);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  
  ctx.stroke();
  
  ctx.fillStyle = 'rgba(0,255,136,0.1)';
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fill();
}

function renderAvatar(agentId) {
  return AVATARS_SVG[agentId] || AVATARS_SVG.main;
}

function renderBar(current, max, label, cls) {
  const pct = max > 0 ? Math.min((current / max) * 100, 100) : 0;
  const low = cls === 'hp' && pct < 30 ? ' low' : '';
  return `
    <div class="bar-row">
      <span class="bar-label">${label}</span>
      <div class="bar-track">
        <div class="bar-fill ${cls}${low}" style="width:${pct}%"></div>
      </div>
      <span class="bar-text">${formatTokens(current)}/${formatTokens(max)}</span>
    </div>
  `;
}

function renderAgents(data) {
  const grid = document.getElementById('agents-grid');
  grid.innerHTML = data.agents.map(a => {
    trackActivity(a);
    
    const avatar = renderAvatar(a.id);
    const statusClass = a.status === 'active' ? 'active' : 'idle';
    const taskStatusClass = a.status === 'active' ? 'working' : 'idle-status';
    const taskStatusText = a.status === 'active' ? '⚔️ ACTIVE' : '💤 IDLE';
    
    return `
      <div class="agent-card ${statusClass}" onclick="openModal('${a.id}')">
        <div class="status-dot ${statusClass}"></div>
        <div class="avatar-area">
          <div class="avatar-container">
            ${a.status === 'active' ? '<div style="position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:24px;animation:spin 2s linear infinite;">⚙️</div>' : ''}
            ${avatar}
          </div>
          <div class="agent-info">
            <h3 style="color:${a.color}">${a.emoji} ${a.name}</h3>
            <div class="agent-role">${a.role}</div>
            <div class="agent-model" style="font-size:8px;color:#888;margin-top:4px;">🧠 ${a.model || 'Sonnet'}</div>
          </div>
        </div>
        <div class="bars">
          <div class="bar-row">
            <span class="bar-label" style="color:#ffd60a">COST</span>
            <div class="bar-track">
              <div class="bar-fill xp" style="width:${Math.min(a.costUsd / 20 * 100, 100)}%"></div>
            </div>
            <span class="bar-text">${formatCost(a.costUsd)}</span>
          </div>
          <div class="bar-row">
            <span class="bar-label" style="color:#34c759">UP</span>
            <div class="bar-track">
              <div class="bar-fill hp" style="width:${Math.min(a.uptimeMinutes / 480 * 100, 100)}%"></div>
            </div>
            <span class="bar-text">${formatUptime(a.uptimeMinutes)}</span>
          </div>
          ${renderBar(a.tokens, 500000, 'TOKENS', 'mp')}
          ${renderBar(a.tasks, 50, 'TASKS', 'xp')}
        </div>
        <div class="task-bubble">
          <span class="task-text">${a.lastTask}</span><br>
          <span class="task-status ${taskStatusClass}">${taskStatusText}</span>
        </div>
        <canvas class="mini-chart" id="chart-${a.id}" width="300" height="40"></canvas>
      </div>
    `;
  }).join('');

  // Draw charts
  data.agents.forEach(a => {
    drawMiniChart(a.id, a.tokens);
  });
  
  // Update activity feed
  renderActivityFeed();

  // Update stats bar
  document.getElementById('total-agents').textContent = data.totals.agents;
  document.getElementById('active-count').textContent = data.totals.active;
  document.getElementById('tokens-today').textContent = '~' + formatTokens(data.totals.totalTokens);
  document.getElementById('total-cost').textContent = formatCost(data.totals.totalCostUsd || 0);
  
  if (data.updatedAt) {
    const d = new Date(data.updatedAt);
    document.getElementById('updated-at').textContent = d.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
  }
}

let currentData = null;

function openModal(agentId) {
  if (!currentData) return;
  const a = currentData.agents.find(x => x.id === agentId);
  if (!a) return;
  
  document.getElementById('modal-title').textContent = `${a.emoji} ${a.name} — DETAILS`;
  document.getElementById('modal-content').innerHTML = `
    <div class="detail-row"><span class="detail-label">ROLE</span><span class="detail-value">${a.role}</span></div>
    <div class="detail-row"><span class="detail-label">MODEL</span><span class="detail-value">${a.model || '—'}</span></div>
    <div class="detail-row"><span class="detail-label">STATUS</span><span class="detail-value" style="color:${a.status==='active'?'#34c759':'#48484a'}">${a.status.toUpperCase()}</span></div>
    <div class="detail-row"><span class="detail-label">COST</span><span class="detail-value" style="color:#ffd60a">${formatCost(a.costUsd)}</span></div>
    <div class="detail-row"><span class="detail-label">UPTIME</span><span class="detail-value">${formatUptime(a.uptimeMinutes)}</span></div>
    <div class="detail-row"><span class="detail-label">TOKENS</span><span class="detail-value">${formatTokens(a.tokens)}</span></div>
    <div class="detail-row"><span class="detail-label">TASKS</span><span class="detail-value">${a.tasks}</span></div>
    <div class="detail-row"><span class="detail-label">CURRENT TASK</span><span class="detail-value">${a.lastTask}</span></div>
    <div class="detail-row"><span class="detail-label">LAST ACTIVE</span><span class="detail-value">${a.lastActivity ? new Date(a.lastActivity).toLocaleString('ru-RU') : '—'}</span></div>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

async function loadData() {
  try {
    const res = await fetch('./data.json?t=' + Date.now());
    if (res.ok) {
      currentData = await res.json();
      renderAgents(currentData);
    }
  } catch(e) {
    console.error('Failed to load data:', e);
  }
}

// Initial load + auto-refresh every 30s
loadData();
loadTaskHistory();
setInterval(loadData, 30000);
setInterval(loadTaskHistory, 60000);
</script>
</body>
